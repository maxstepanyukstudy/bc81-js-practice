<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
      BC81 JS Practice - 07-20 - DOM API - innerHTML templates insert-add
    </title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        padding: 16px;
      }

      .article {
        max-width: 320px;
      }

      .article-text {
        color: tomato;
      }
    </style>
  </head>

  <body>
    <article class="article">
      <h2>Article title</h2>
    </article>

    <script>
      const article = document.querySelector('.article');
      const htmlString = `<p class="article-text">Nullam quis ante. Vestibulum dapibus nunc ac augue. In consectetuer turpis ut velit.</p><a class="link" href="#">Read more...</a>`;

      // Replace += with = operator. See the difference?
      // Article title is lost because we overwrite element content.
      article.innerHTML += htmlString;
    </script>
  </body>
</html>
